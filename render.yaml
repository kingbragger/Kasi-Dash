services:
  - type: web
    name: kasidash-api
    runtime: node
    region: oregon
    plan: free
    buildCommand: pnpm install --frozen-lockfile && pnpm run typecheck:libs && pnpm --filter @workspace/api-server run build
    startCommand: node artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        sync: false
      - key: OZOW_SITE_CODE
        sync: false
      - key: OZOW_PRIVATE_KEY
        sync: false
      - key: OZOW_API_KEY
        sync: false
      - key: OZOW_IS_TEST
        value: "false"
